<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مكتبة أثر - رفع المجلة</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="splash-screen" class="splash">
        <div class="logo-container">
            <h1 class="logo-text">مكتبة أثر</h1>
            <p>للطباعة والتصميم</p>
            <div class="loader-line"></div>
        </div>
    </div>

    <div class="glass-container" id="main-app" style="display: none;">
        <header>
            <h1>مجلة الصور الذكية</h1>
        </header>

        <section id="user-section">
            <div class="user-info">
                <input type="text" id="user-name" placeholder="أدخل اسمك الكريم" required>
            </div>
            
            <div id="templates-container"></div>

            <button class="action-btn btn-3d blue-btn" onclick="addNewTemplate()" style="margin-bottom: 20px;">+ إضافة صفحة جديدة (4 صور)</button>

            <button id="process-btn" class="main-btn btn-3d">رفع الألبوم للمطبعة</button>
        </section>
    </div>

    <div id="editor-modal" class="modal">
        <div class="modal-content glass-3d">
            <h3>ضبط الصورة داخل الإطار</h3>
            <div class="crop-container"><canvas id="crop-canvas"></canvas></div>
            <div class="editor-controls">
                <input type="range" id="zoom-slider" min="0.1" max="3" step="0.01" value="1">
                <input type="file" id="file-input" hidden accept="image/*">
                <div class="btn-group">
                    <button class="action-btn btn-3d blue-btn" onclick="document.getElementById('file-input').click()">اختيار صورة</button>
                    <button class="action-btn btn-3d green-btn" onclick="saveCrop()">تم الضبط</button>
                    <button class="action-btn btn-3d red-btn" onclick="closeEditor()">إلغاء</button>
                </div>
            </div>
        </div>
    </div>

    <div id="progress-modal" class="modal">
        <div class="alert-box glass-3d">
            <h3 style="color: #4ade80;">جاري الرفع...</h3>
            <p style="color: #cbd5e1; font-size: 0.9rem;">الرجاء عدم الخروج من التطبيق لحين اكتمال الرفع</p>
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar-fill"></div>
            </div>
            <p id="progress-text">0 / 0 صور</p>
        </div>
    </div>

    <div id="custom-alert" class="modal">
        <div class="alert-box glass-3d">
            <div id="alert-icon">🔔</div>
            <h3 id="alert-title">تنبيه</h3>
            <p id="alert-message">رسالة</p>
            <button class="action-btn btn-3d blue-btn" onclick="document.getElementById('custom-alert').style.display='none'">حسناً</button>
        </div>
    </div>

    <canvas id="a4-canvas" width="2480" height="3508" style="display:none;"></canvas>
    
    <script type="module" src="script.js"></script>
</body>
</html>
